    .modal-btn-secondary {

      color: #333;

    .modal-btn-cancel {
      background-color: transparent;
      color: #666;
      margin-bottom: 0;

</head>

    // Função para calcular semana gestacional baseada no DPP - IDÊNTICO AO ORIGINAL
    function calcularSemanaGestacional(dpp) {
      if (!dpp) return null;
      const dataAtual = new Date();
      const dataDPP = new Date(dpp + 'T00:00:00');
      const diffMs = dataDPP - dataAtual;
      const diffDias = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const semanas = Math.floor((280 - diffDias) / 7);
      const dias = (280 - diffDias) % 7;
      return { semanas, dias };
    }

  <script>
    // Script para adicionar Termos no menu da engrenagem
    (function() {
      function adicionarTermosNoMenu() {
        // Aguardar o menu ser renderizado
        // Procurar pelo item "Sair da Conta"
        const items = document.querySelectorAll('.dropdown-item.danger');
        
        for (let item of items) {
          if (item.textContent.includes('Sair da Conta')) {
            // Padronizar estilo do botão Sair da Conta
            item.style.fontWeight = '600';
            
            // Criar novo item dos Termos
              const termosSection = document.createElement('div');
              termosSection.className = 'dropdown-section';
              
              const termosItem = document.createElement('button');
              termosItem.className = 'btn btn-primary';
              termosItem.innerHTML = '\ud83d\udcdc Termos e Privacidade';
              termosItem.style.cssText = 'width: 100%; margin-top: 10px;';
              termosItem.onclick = function() {
                window.open('https://www.pndigital.com.br/termos.html?from=app', '_blank');
              };
              
              termosSection.appendChild(termosItem);
              
              // Inserir antes da seção do "Sair da Conta"
              const sairSection = item.parentElement;
              sairSection.parentElement.insertBefore(termosSection, sairSection);
              
            break;
          }
        }
      }
      
      // Executar quando a página carregar
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', adicionarTermosNoMenu);
      } else {
        adicionarTermosNoMenu();
      }
      
      // Também executar quando o menu abrir
      document.addEventListener('click', function(e) {
        if (e.target.textContent && e.target.textContent.includes('⚙')) {
          adicionarTermosNoMenu();
        }
      });
    })();
  </script>
